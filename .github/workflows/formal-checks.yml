name: formal-checks

on:
  pull_request:

jobs:
  trace-and-tla:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Run replication trace drift checks
        run: make test-tla-trace

      - name: Install Java (for TLC)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Run bounded TLC checks (required)
        shell: bash
        run: |
          set -euo pipefail
          if command -v tlc >/dev/null 2>&1; then
            make test-tla
            exit 0
          fi
          if [[ ! -f ./tools/tla2tools.jar ]]; then
            mkdir -p ./tools
            curl -fsSL \
              https://github.com/tlaplus/tlaplus/releases/latest/download/tla2tools.jar \
              -o ./tools/tla2tools.jar
          fi
          if [[ -f ./tools/tla2tools.jar ]]; then
            env TLA2TOOLS_JAR=./tools/tla2tools.jar make test-tla
          else
            echo "::error::TLC unavailable and tla2tools.jar could not be downloaded."
            exit 1
          fi
