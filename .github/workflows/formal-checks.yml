name: formal-checks

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trace-and-tla:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Run replication trace drift checks
        run: make test-tla-trace

      - name: Install Java (for TLC)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Run bounded TLC checks (required)
        shell: bash
        run: |
          set -euo pipefail
          if command -v tlc >/dev/null 2>&1; then
            make test-tla
            exit 0
          fi
          if [[ ! -f ./tools/tla2tools.jar ]]; then
            mkdir -p ./tools
            curl -fsSL \
              https://github.com/tlaplus/tlaplus/releases/latest/download/tla2tools.jar \
              -o ./tools/tla2tools.jar
          fi
          if [[ -f ./tools/tla2tools.jar ]]; then
            env TLA2TOOLS_JAR=./tools/tla2tools.jar make test-tla
          else
            echo "::error::TLC unavailable and tla2tools.jar could not be downloaded."
            exit 1
          fi

  # Each harness in `crates/kcore-sanitize/src/lib.rs` is independent
  # and runs as its own matrix shard on a dedicated runner. This:
  #
  #   - parallelises wall-clock across GHA runners (~9× speed-up vs
  #     a single job running all harnesses sequentially);
  #
  #   - eliminates the OOM risk from `cargo kani --jobs N` (each
  #     runner verifies one harness, so the 16 GB / 4 vCPU runner
  #     never sees more than one CBMC process at a time);
  #
  #   - bounds the blast radius: a regression in one harness fails
  #     just that shard rather than masking later harnesses behind
  #     the failed one.
  #
  # All shards share the same Kani toolchain cache key (the
  # toolchain is identical), so the first shard to finish install
  # warms the cache for all the others on subsequent runs.
  kani-shard:
    name: kani-shard / ${{ matrix.crate }} :: ${{ matrix.harness }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      # `fail-fast: false` lets all harnesses report results even
      # if one regresses; otherwise GHA cancels the rest and we lose
      # signal on the others.
      fail-fast: false
      matrix:
        # Fully-qualified harness paths from each crate's
        # `kani_proofs` module. `crate` selects which workspace
        # member `cargo kani -p` operates on.
        include:
          - crate: kcore-sanitize
            harness: kani_proofs::nix_escape_never_panics
          - crate: kcore-sanitize
            harness: kani_proofs::nix_escape_output_is_always_safe
          - crate: kcore-sanitize
            harness: kani_proofs::sanitize_nix_attr_key_preserves_char_count
          - crate: kcore-sanitize
            harness: kani_proofs::sanitize_nix_attr_key_charset
          - crate: kcore-sanitize
            harness: kani_proofs::dot_dot_check_never_panics
          - crate: kcore-sanitize
            harness: kani_proofs::assert_safe_path_never_panics
          - crate: kcore-sanitize
            harness: kani_proofs::assert_safe_path_acceptance_implies_safe
          - crate: kcore-sanitize
            harness: kani_proofs::segment_validation_never_panics
          - crate: kcore-sanitize
            harness: kani_proofs::segment_acceptance_implies_safe
          # `kcore-disko-types` is the shared, std-only crate used by
          # both the controller pre-flight classifier and the node-
          # agent authoritative classifier. The harnesses below cover
          # the layout-diff parser (`extract_target_devices` +
          # `strip_nix_comments`) — its post-conditions are what
          # downstream classifier safety arguments rest on.
          - crate: kcore-disko-types
            harness: kani_proofs::extract_target_devices_never_panics
          - crate: kcore-disko-types
            harness: kani_proofs::strip_nix_comments_preserves_length
          - crate: kcore-disko-types
            harness: kani_proofs::extract_target_devices_outputs_dev_prefixed_paths
          - crate: kcore-disko-types
            harness: kani_proofs::extract_target_devices_is_deterministic
    # Pinned kani-verifier version. Bumping this single env var
    # (here AND in the cache key below) is the only change needed
    # to roll forward; the install step honours it and the cache
    # key invalidates automatically.
    #
    # Why pin: each Kani release ships a different CBMC payload
    # downloaded by `cargo-kani setup`. Without a pin, a stale
    # `~/.kani` layout from cache + a freshly-installed newer
    # `cargo-kani` binary could mismatch silently; with a pin, the
    # cache key encodes the version and the two stay in lock-step.
    env:
      KANI_VERSION: "0.67.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Caches ~/.cargo/registry, ~/.cargo/git and ./target so the
      # `cargo install --locked kani-verifier` step plus the per-crate
      # `cargo kani` invocations skip the full Rust build on warm runs.
      # Sharded by matrix entry so each shard's `target/` cache stays
      # independent (different harness names produce different build
      # plans for `cargo kani`).
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: kani-${{ matrix.crate }}-${{ matrix.harness }}

      # Caches the Kani toolchain itself (CBMC + symex binaries +
      # ~/.kani layout). Cold install of kani-verifier from crates.io
      # plus `cargo-kani setup` (which downloads a ~140 MB CBMC
      # tarball) takes ~5-10 min on a 4-vCPU GHA runner; a cache hit
      # is ~30 s.
      #
      # IMPORTANT: we split the cache into separate `restore` and
      # `save` steps so the cache is written **even when the job
      # fails**. With the default combined `actions/cache@v4`, the
      # cache is only persisted on job success — so a single failing
      # proof or a timed-out step would force every retry to pay the
      # full cold install cost again.
      #
      # Cache key is intentionally SHARED across all matrix shards
      # (it does NOT depend on `matrix.harness`): the Kani toolchain
      # is identical for every harness, so the first shard to finish
      # `cargo-kani setup` warms the cache for every other shard on
      # the next run.
      - name: Restore Kani toolchain cache
        id: kani-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/bin/cargo-kani
            ~/.cargo/bin/kani
            ~/.kani
          key: kani-toolchain-${{ runner.os }}-v${{ env.KANI_VERSION }}
          restore-keys: |
            kani-toolchain-${{ runner.os }}-v

      # We install Kani directly instead of via
      # `model-checking/kani-github-action@v1.1` because that composite
      # action's last step runs `cargo-kani` at the workspace root with
      # no `-p` flag, which on this multi-crate workspace tries to
      # verify every member and hangs (cancelled at ~9-10 min, well
      # before our 15-min step budget). Direct install + explicit
      # `-p kcore-sanitize --harness` below gives predictable timing.
      #
      # No protobuf compiler is needed: `kcore-sanitize` is a leaf
      # crate with zero non-std dependencies.
      #
      # `cargo-kani setup` is only run when the cache did not already
      # restore `~/.kani`, since `setup` re-downloads the CBMC payload
      # every time it runs even when the layout is already in place.
      - name: Install kani-verifier
        id: kani-install
        timeout-minutes: 10
        run: |
          set -euo pipefail
          if ! command -v cargo-kani >/dev/null 2>&1; then
            cargo install --locked kani-verifier --version "${KANI_VERSION}"
          else
            installed="$(cargo-kani --version 2>/dev/null | awk '{print $NF}')"
            if [ "${installed}" != "${KANI_VERSION}" ]; then
              echo "Cached cargo-kani is ${installed}, want ${KANI_VERSION}; reinstalling."
              cargo install --locked --force kani-verifier --version "${KANI_VERSION}"
            else
              echo "Cached cargo-kani matches pin (${installed})."
            fi
          fi
          if [ ! -d "$HOME/.kani" ] || [ -z "$(ls -A "$HOME/.kani" 2>/dev/null)" ]; then
            cargo-kani setup
          else
            echo "kani toolchain restored from cache, skipping cargo-kani setup"
          fi

      # Save the Kani toolchain cache **immediately after install**,
      # before the proof step (which can fail, time out, OOM, or be
      # cancelled by the user). This is the only reliable way to
      # warm the cache for subsequent runs.
      #
      # On a cold cache, all 9 matrix shards race to install and
      # then race to save under the same key. GitHub Actions
      # serialises the saves: the first one wins and the others
      # log a no-op warning ("Cache already exists"). That is fine
      # — the toolchain is identical so any winner is correct.
      #
      # Skipped when we already restored a cache hit.
      - name: Save Kani toolchain cache (post-install)
        if: steps.kani-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: |
            ~/.cargo/bin/cargo-kani
            ~/.cargo/bin/kani
            ~/.kani
          key: ${{ steps.kani-cache.outputs.cache-primary-key }}

      # Each proof lives in a leaf crate with **no non-std
      # dependencies** (`kcore-sanitize`, `kcore-disko-types`), so
      # Kani only has to compile that one crate (a few seconds)
      # instead of the full controller dep graph (rusqlite-bundled
      # SQLite, rcgen+aws-lc-rs, tonic, ... which takes >20 min on
      # a 4-vCPU GHA runner).
      #
      # `--harness` is a substring match; we anchor with the full
      # `kani_proofs::` module path so a future harness with a
      # name collision in another crate cannot silently steal the
      # match. `--exact` would be stricter but does not exist in
      # kani-verifier 0.67.0.
      - name: Run bounded Kani proof
        timeout-minutes: 8
        run: |
          set -euo pipefail
          cargo-kani --version
          cargo kani -p '${{ matrix.crate }}' \
            --harness '${{ matrix.harness }}' \
            --output-format terse

  # Single aggregator job that branch-protection / required-status-
  # checks can require by the stable name "formal-checks / kani".
  # Without this, switching the per-harness matrix would force every
  # PR reviewer to update the required-checks list (and would break
  # `main` until they did).
  kani:
    name: kani
    needs: [kani-shard]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify all kani shards passed
        run: |
          set -euo pipefail
          result='${{ needs.kani-shard.result }}'
          if [[ "${result}" != "success" ]]; then
            echo "::error::One or more kani shards did not succeed (aggregate result=${result})"
            exit 1
          fi
          echo "All kani matrix shards passed."
