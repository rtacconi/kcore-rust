syntax = "proto3";

package kcore.controller;

option go_package = "github.com/kcore/kcore/api/controller";

import "google/protobuf/timestamp.proto";

// Controller service - orchestrates VMs across nodes
service Controller {
  // Node registration and heartbeat
  rpc RegisterNode(RegisterNodeRequest) returns (RegisterNodeResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc SyncVmState(SyncVmStateRequest) returns (SyncVmStateResponse);
  
  // VM operations (declarative desired-state API managed by controller)
  rpc CreateVm(CreateVmRequest) returns (CreateVmResponse);
  rpc UpdateVm(UpdateVmRequest) returns (UpdateVmResponse);
  rpc DeleteVm(DeleteVmRequest) returns (DeleteVmResponse);
  rpc SetVmDesiredState(SetVmDesiredStateRequest) returns (SetVmDesiredStateResponse);
  rpc GetVm(GetVmRequest) returns (GetVmResponse);
  rpc ListVms(ListVmsRequest) returns (ListVmsResponse);
  rpc CreateNetwork(CreateNetworkRequest) returns (CreateNetworkResponse);
  rpc DeleteNetwork(DeleteNetworkRequest) returns (DeleteNetworkResponse);
  rpc ListNetworks(ListNetworksRequest) returns (ListNetworksResponse);
  
  // Node operations
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse);
  rpc GetNode(GetNodeRequest) returns (GetNodeResponse);

  // SSH key management
  rpc CreateSshKey(CreateSshKeyRequest) returns (CreateSshKeyResponse);
  rpc DeleteSshKey(DeleteSshKeyRequest) returns (DeleteSshKeyResponse);
  rpc ListSshKeys(ListSshKeysRequest) returns (ListSshKeysResponse);
  rpc GetSshKey(GetSshKeyRequest) returns (GetSshKeyResponse);

  // Node lifecycle
  rpc DrainNode(DrainNodeRequest) returns (DrainNodeResponse);
  rpc ApproveNode(ApproveNodeRequest) returns (ApproveNodeResponse);
  rpc RejectNode(RejectNodeRequest) returns (RejectNodeResponse);

  // Certificate rotation
  rpc RenewNodeCert(RenewNodeCertRequest) returns (RenewNodeCertResponse);
  rpc RotateSubCa(RotateSubCaRequest) returns (RotateSubCaResponse);
  rpc ReloadTls(ReloadTlsRequest) returns (ReloadTlsResponse);

  // Compliance
  rpc GetComplianceReport(GetComplianceReportRequest) returns (GetComplianceReportResponse);

  // Network overview: host interfaces from each node + default network config
  rpc GetNetworkOverview(GetNetworkOverviewRequest) returns (GetNetworkOverviewResponse);
}

message RegisterNodeRequest {
  string node_id = 1;
  string hostname = 2;
  string address = 3; // gRPC endpoint address
  NodeCapacity capacity = 4;
  repeated string labels = 5; // e.g., "dc=dc-a", "rack=rack-1"
  StorageBackendType storage_backend = 6; // Node storage backend capability (filesystem/lvm/zfs)
  bool disable_vxlan = 7; // When true, node does not support VXLAN overlay networking
  int32 cert_expiry_days = 8; // Days until node TLS certificate expires
  string luks_method = 9;     // "tpm2", "key-file", or "" (not reported)
}

message RegisterNodeResponse {
  bool success = 1;
  string message = 2;
  string approval_status = 3;
}

message HeartbeatRequest {
  string node_id = 1;
  NodeUsage usage = 2;
  int32 cert_expiry_days = 3; // Days until node TLS certificate expires
  string luks_method = 4;     // "tpm2", "key-file", or "" (not reported)
}

message HeartbeatResponse {
  bool success = 1;
}

message SyncVmStateRequest {
  string node_id = 1;
  repeated VmInfo vms = 2;  // Complete list of VMs currently on this node
}

message SyncVmStateResponse {
  bool success = 1;
}

message NodeCapacity {
  int32 cpu_cores = 1;
  int64 memory_bytes = 2;
}

message NodeUsage {
  int32 cpu_cores_used = 1;
  int64 memory_bytes_used = 2;
}

enum StorageBackendType {
  STORAGE_BACKEND_TYPE_UNSPECIFIED = 0;
  STORAGE_BACKEND_TYPE_FILESYSTEM = 1;
  STORAGE_BACKEND_TYPE_LVM = 2;
  STORAGE_BACKEND_TYPE_ZFS = 3;
}

// VM Operations - all include target_node for explicit node selection

message CreateVmRequest {
  string target_node = 1;  // Node address (e.g., "192.168.1.10:9091") - optional, controller picks if empty
  VmSpec spec = 2;
  string image_url = 3;     // HTTPS image URL to download on target node
  string image_sha256 = 4;  // Required SHA256 checksum for image_url
  string cloud_init_user_data = 5;  // Optional cloud-init user-data (YAML); uses default if empty
  string image_path = 6;    // Optional node-local image path (alternative to image_url/image_sha256)
  string image_format = 7;  // Required when image_path is used: qcow2 or raw
  repeated string ssh_key_names = 8;  // SSH key names to inject (looked up from controller DB)
  StorageBackendType storage_backend = 9; // Required VM storage backend for compatibility checks
  int64 storage_size_bytes = 10; // Required VM storage size in bytes (> 0)
}

message CreateVmResponse {
  string vm_id = 1;
  string node_id = 2;  // Which node created it
  VmState state = 3;
}

message UpdateVmRequest {
  string vm_id = 1;
  string target_node = 2;  // Optional
  int32 cpu = 3;            // New CPU count (0 = no change)
  int64 memory_bytes = 4;   // New memory (0 = no change)
}

message UpdateVmResponse {
  bool success = 1;
  string message = 2;
}

message DeleteVmRequest {
  string vm_id = 1;
  string target_node = 2;  // Optional - controller finds it if empty
}

message DeleteVmResponse {
  bool success = 1;
}

enum VmDesiredState {
  VM_DESIRED_STATE_UNSPECIFIED = 0;
  VM_DESIRED_STATE_RUNNING = 1;
  VM_DESIRED_STATE_STOPPED = 2;
}

message SetVmDesiredStateRequest {
  string vm_id = 1;
  VmDesiredState desired_state = 2;
  string target_node = 3;  // Optional
}

message SetVmDesiredStateResponse {
  VmState state = 1;
}

message GetVmRequest {
  string vm_id = 1;
  string target_node = 2;  // Optional
}

message GetVmResponse {
  VmSpec spec = 1;
  VmStatus status = 2;
  string node_id = 3;  // Which node it's on
}

message ListVmsRequest {
  string target_node = 1;  // Optional - list from specific node, or all nodes if empty
}

message ListVmsResponse {
  repeated VmInfo vms = 1;
}

message CreateNetworkRequest {
  string name = 1;
  string external_ip = 2;
  string gateway_ip = 3;
  string internal_netmask = 4;
  string target_node = 5;  // Optional - controller picks if empty
  repeated int32 allowed_tcp_ports = 6;  // TCP ports to DNAT-forward from external IP
  repeated int32 allowed_udp_ports = 7;  // UDP ports to DNAT-forward from external IP
  int32 vlan_id = 8;  // Optional VLAN tag (0 = no VLAN, bridges directly on gatewayInterface)
  string network_type = 9;  // "nat" (default), "bridge", or "vxlan"
  bool enable_outbound_nat = 10;  // For vxlan: whether VMs can reach the internet (default true)
}

message CreateNetworkResponse {
  bool success = 1;
  string message = 2;
  string node_id = 3;
}

message DeleteNetworkRequest {
  string name = 1;
  string target_node = 2;  // Optional - controller resolves by name if unique
}

message DeleteNetworkResponse {
  bool success = 1;
}

message ListNetworksRequest {
  string target_node = 1;  // Optional
}

message ListNetworksResponse {
  repeated NetworkInfo networks = 1;
}

message NetworkInfo {
  string name = 1;
  string external_ip = 2;
  string gateway_ip = 3;
  string internal_netmask = 4;
  string node_id = 5;
  repeated int32 allowed_tcp_ports = 6;
  repeated int32 allowed_udp_ports = 7;
  int32 vlan_id = 8;
  string network_type = 9;  // "nat", "bridge", or "vxlan"
  bool enable_outbound_nat = 10;
}

message VmInfo {
  string id = 1;
  string name = 2;
  VmState state = 3;
  int32 cpu = 4;
  int64 memory_bytes = 5;
  string node_id = 6;  // Which node it's on
  google.protobuf.Timestamp created_at = 7;
}

// Node Operations

message ListNodesRequest {}

message ListNodesResponse {
  repeated NodeInfo nodes = 1;
}

message NodeInfo {
  string node_id = 1;
  string hostname = 2;
  string address = 3;
  NodeCapacity capacity = 4;
  NodeUsage usage = 5;
  string status = 6;  // "ready", "not-ready", "unknown"
  google.protobuf.Timestamp last_heartbeat = 7;
  repeated string labels = 8;  // e.g., "dc=dc-a", "rack=rack-1"
  StorageBackendType storage_backend = 9;
  bool disable_vxlan = 10; // When true, VXLAN overlay networking is disabled
  string approval_status = 11; // "pending", "approved", or "rejected"
  int32 cert_expiry_days = 12; // Days until node TLS certificate expires (-1 = unknown)
  string luks_method = 13;     // "tpm2", "key-file", or "" (unknown/not reported)
}

message GetNodeRequest {
  string node_id = 1;
}

message GetNodeResponse {
  NodeInfo node = 1;
}

// VM Spec (simplified from node.proto)

message VmSpec {
  string id = 1;
  string name = 2;
  int32 cpu = 3;
  int64 memory_bytes = 4;
  repeated Disk disks = 5;
  repeated Nic nics = 6;
}

message Disk {
  string name = 1;
  string backend_handle = 2;
  string bus = 3;
  string device = 4;
}

message Nic {
  string network = 1;
  string model = 2;
  string mac_address = 3;
}

enum VmState {
  VM_STATE_UNKNOWN = 0;
  VM_STATE_STOPPED = 1;
  VM_STATE_RUNNING = 2;
  VM_STATE_PAUSED = 3;
  VM_STATE_ERROR = 4;
}

message VmStatus {
  string id = 1;
  VmState state = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
}

// Management API messages (controller-side)

message ApplyNixConfigRequest {
  // Full contents to write to /etc/nixos/configuration.nix
  string configuration_nix = 1;

  // When true, run `nixos-rebuild switch` after writing the file.
  // When false, only write the file.
  bool rebuild = 2;
}

message ApplyNixConfigResponse {
  bool success = 1;
  string message = 2;
}

// ControllerAdmin service provides controller-level management operations.
// Deployments are expected to enforce mTLS on the transport layer.
service ControllerAdmin {
  // ApplyNixConfig replaces the controller's /etc/nixos/configuration.nix with
  // the provided content and (optionally) triggers a nixos-rebuild.
  rpc ApplyNixConfig(ApplyNixConfigRequest) returns (ApplyNixConfigResponse);
  // Returns a page of replication outbox events after the provided cursor.
  rpc GetReplicationEvents(GetReplicationEventsRequest) returns (GetReplicationEventsResponse);
  // Stores peer replication acknowledgement frontier.
  rpc AckReplicationEvents(AckReplicationEventsRequest) returns (AckReplicationEventsResponse);
  // Reports replication lag and frontier health.
  rpc GetReplicationStatus(GetReplicationStatusRequest) returns (GetReplicationStatusResponse);
  // Lists unresolved replication conflicts for operator workflows.
  rpc ListReplicationConflicts(ListReplicationConflictsRequest) returns (ListReplicationConflictsResponse);
  // Marks a replication conflict resolved.
  rpc ResolveReplicationConflict(ResolveReplicationConflictRequest) returns (ResolveReplicationConflictResponse);
}

message GetReplicationEventsRequest {
  int64 after_event_id = 1; // Exclusive cursor; 0 means from start.
  int32 limit = 2; // Max rows to return; defaults server-side when <= 0.
}

message ReplicationEvent {
  int64 event_id = 1;
  string created_at = 2;
  string event_type = 3;
  string resource_key = 4;
  bytes payload = 5;
}

message GetReplicationEventsResponse {
  repeated ReplicationEvent events = 1;
}

message AckReplicationEventsRequest {
  string peer_id = 1;
  int64 last_event_id = 2;
}

message AckReplicationEventsResponse {
  bool success = 1;
}

message GetReplicationStatusRequest {}

message ReplicationOutgoingStatus {
  string peer_id = 1;
  int64 last_acked_event_id = 2;
  int64 lag_events = 3;
}

message ReplicationIncomingStatus {
  string peer_endpoint = 1;
  int64 last_pulled_event_id = 2;
  int64 last_applied_event_id = 3;
}

message GetReplicationStatusResponse {
  int64 outbox_head_event_id = 1;
  int64 outbox_size = 2;
  repeated ReplicationOutgoingStatus outgoing = 3;
  repeated ReplicationIncomingStatus incoming = 4;
  int64 unresolved_conflicts = 5;
  int64 pending_compensation_jobs = 6;
  int64 failed_compensation_jobs = 7;
  int64 materialization_backlog = 8;
  int64 oldest_unresolved_conflict_age_seconds = 9;
  int64 failed_reservations = 10;
  bool zero_manual_slo_healthy = 11;
  repeated string zero_manual_slo_violations = 12;
  int64 failed_retryable_reservations = 13;
  int64 failed_non_retryable_reservations = 14;
  int64 retry_exhausted_reservations = 15;
}

message ListReplicationConflictsRequest {
  int32 limit = 1;
}

message ReplicationConflictInfo {
  int64 id = 1;
  string resource_key = 2;
  string incumbent_op_id = 3;
  string challenger_op_id = 4;
  string incumbent_controller_id = 5;
  string challenger_controller_id = 6;
  string reason = 7;
}

message ListReplicationConflictsResponse {
  repeated ReplicationConflictInfo conflicts = 1;
}

message ResolveReplicationConflictRequest {
  int64 id = 1;
}

message ResolveReplicationConflictResponse {
  bool success = 1;
}

// SSH Key Management

message CreateSshKeyRequest {
  string name = 1;
  string public_key = 2;  // e.g., "ssh-rsa AAAA... user@host"
}

message CreateSshKeyResponse {
  bool success = 1;
  string message = 2;
}

message DeleteSshKeyRequest {
  string name = 1;
}

message DeleteSshKeyResponse {
  bool success = 1;
}

message ListSshKeysRequest {}

message ListSshKeysResponse {
  repeated SshKeyInfo keys = 1;
}

message GetSshKeyRequest {
  string name = 1;
}

message GetSshKeyResponse {
  SshKeyInfo key = 1;
}

message SshKeyInfo {
  string name = 1;
  string public_key = 2;
  google.protobuf.Timestamp created_at = 3;
}

// Node Drain

message DrainNodeRequest {
  string node_id = 1;
  string target_node = 2;  // Optional: move VMs to this specific node; auto-schedule if empty
}

message DrainNodeResponse {
  bool success = 1;
  int32 vms_migrated = 2;
  string message = 3;
}

// Node Approval

message ApproveNodeRequest {
  string node_id = 1;
}

message ApproveNodeResponse {
  bool success = 1;
  string message = 2;
}

message RejectNodeRequest {
  string node_id = 1;
}

message RejectNodeResponse {
  bool success = 1;
  string message = 2;
}

// Certificate Rotation

message RenewNodeCertRequest {
  string node_id = 1;
}

message RenewNodeCertResponse {
  bool success = 1;
  string cert_pem = 2;
  string key_pem = 3;
  string message = 4;
}

message RotateSubCaRequest {
  string sub_ca_cert_pem = 1;
  string sub_ca_key_pem = 2;
}

message RotateSubCaResponse {
  bool success = 1;
  string message = 2;
}

message ReloadTlsRequest {
  string cert_pem = 1;
  string key_pem = 2;
}

message ReloadTlsResponse {
  bool success = 1;
  string message = 2;
}

// Compliance Report

message GetComplianceReportRequest {}

message AccessControlEntry {
  string rpc_method = 1;
  string allowed_identities = 2;
}

message GetComplianceReportResponse {
  string controller_version = 1;

  string crypto_library = 2;
  repeated string tls13_cipher_suites = 3;
  repeated string tls12_cipher_suites = 4;
  repeated string kx_groups = 5;
  repeated string excluded_algorithms = 6;

  bool mtls_enabled = 7;

  repeated AccessControlEntry access_control = 8;

  int32 total_nodes = 9;
  int32 approved_nodes = 10;
  int32 pending_nodes = 11;
  int32 rejected_nodes = 12;

  int32 total_vms = 13;
  int32 running_vms = 14;
  int32 stopped_vms = 15;

  int32 total_networks = 16;
  int32 nat_networks = 17;
  int32 bridge_networks = 18;
  int32 vxlan_networks = 19;

  bool sub_ca_enabled = 20;
  int32 cert_auto_renewal_days = 21;
  int32 nodes_expiring_30d = 22;
  int32 nodes_cert_unknown = 23;

  repeated NodeInfo nodes = 24;

  int32 nodes_luks_tpm2 = 25;      // Nodes with TPM2-sealed LUKS
  int32 nodes_luks_keyfile = 26;   // Nodes with key-file LUKS
  int32 nodes_luks_unknown = 27;   // Nodes with unknown/unreported LUKS status
}

// Network overview

message GetNetworkOverviewRequest {}

message NetworkInterfaceDetail {
  string name = 1;
  string mac_address = 2;
  string state = 3;
  int32 mtu = 4;
  repeated string addresses = 5;
}

message NodeNetworkInfo {
  string node_id = 1;
  string hostname = 2;
  string address = 3;
  string gateway_interface = 4;
  bool disable_vxlan = 5;
  repeated NetworkInterfaceDetail interfaces = 6;
}

message GetNetworkOverviewResponse {
  string default_gateway_interface = 1;
  string default_external_ip = 2;
  string default_gateway_ip = 3;
  string default_internal_netmask = 4;
  repeated NodeNetworkInfo nodes = 5;
}
